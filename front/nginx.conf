server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API requests to backend (strip /api prefix so backend receives /reservations, /uploads/... etc.)
    # ^~ so this wins over the static-asset regex (e.g. /api/uploads/.../image.jpg)
    location ^~ /api/ {
        proxy_pass http://pos-back:8020/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket requests to ws-bridge
    location /ws {
        proxy_pass http://pos-ws-bridge:8021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Remove /ws prefix before passing to ws-bridge if needed
        # Our ws-bridge expects the path without /ws if it's already stripped by HAProxy, 
        # but let's check how it's implemented.
        rewrite ^/ws/(.*) /$1 break;
    }

    # Marketing SPAs: snippets file is included only here (must NOT live under conf.d/*.conf).
    include /etc/nginx/snippets/marketing-sites.generated.conf;

    # Let's Encrypt HTTP-01 (certbot --webroot -w certbot/www). Mount certbot/www → /var/www/certbot in prod.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache the document so clients get new asset hashes after deploy
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache control for static assets (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Health check
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy";
    }
}
