# HAProxy config for production: HTTPS on 443, HTTP→HTTPS redirect.
# Used by docker-compose.prod.yml. Certs from /etc/haproxy/certs (mount certbot/haproxy-certs).
#
# Reliability notes:
# - API health uses GET /health (tiny JSON) instead of /docs so Layer7 checks complete quickly
#   after container start and backends are marked UP sooner (avoids api_backend/<NOSRV> 503).
# - timeout check: explicit budget for slow hosts under load.
# - inter / downinter / rise / fall: predictable UP/DOWN; downinter polls faster while DOWN so
#   recovery after deploy is quicker than the normal inter interval.
global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout check 5s
    option forwardfor
    retries 3

frontend http_frontend
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs
    mode http
    redirect scheme https code 301 if !{ ssl_fc } !{ path_beg /.well-known/acme-challenge }

    acl is_app_ws path_beg /ws
    use_backend ws_backend if is_app_ws

    acl is_api path_beg /api
    use_backend api_backend if is_api

    default_backend frontend_backend

backend ws_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    http-request set-path %[path,regsub(^/ws/,/)]
    server ws1 pos-ws-bridge:8021 check inter 3s downinter 1s rise 2 fall 3

backend api_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    http-request set-path %[path,regsub(^/api/,/)]
    server api1 pos-back:8020 check inter 3s downinter 1s rise 2 fall 3

backend frontend_backend
    mode http
    balance roundrobin
    option httpchk GET /
    http-check send hdr Host localhost
    http-check expect status 200
    http-request set-header Host localhost
    server front1 pos-front:80 check inter 3s downinter 1s rise 2 fall 3
