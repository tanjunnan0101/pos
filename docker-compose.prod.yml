# Production overlay (amvara9 / deploy). Use with base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# HAProxy uses haproxy.prod.cfg + certbot/haproxy-certs; ports 80 and 443.
services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        COMMIT_HASH: ${COMMIT_HASH:-}
    container_name: pos-front
    restart: unless-stopped
    # No host port in prod: HAProxy terminates all end-user traffic on 80/443
    environment:
      - API_URL=${API_URL:-/api}
      - WS_URL=${WS_URL:-}
    depends_on:
      - db
      - redis
      - ws-bridge
      - back
    volumes:
      - ./certbot/www:/var/www/certbot:ro

  # Production: HAProxy with HTTPS and HTTP→HTTPS redirect; certs from certbot/haproxy-certs.
  haproxy:
    volumes:
      - ./haproxy/haproxy.prod.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certbot/haproxy-certs:/etc/haproxy/certs:ro
    ports:
      - "80:80"
      - "443:443"
